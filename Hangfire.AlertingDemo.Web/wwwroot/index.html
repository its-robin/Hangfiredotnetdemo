<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Hangfire Alerting Demo</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin: 2rem; }
    button { margin-right: 1rem; margin-bottom: 1rem; }
    #output { white-space: pre-wrap; background:#f6f6f6; padding:1rem; border-radius:4px; margin-top:1rem }
  </style>
</head>
<body>
  <h1>Hangfire Alerting Demo</h1>
  <p>Use the buttons below to trigger sample jobs. The Hangfire dashboard is available at <a href="/hangfire" target="_blank">/hangfire</a>.</p>
  <div>
    <button id="btn-fire">Fire-and-forget Email</button>
    <button id="btn-delayed">Delayed Email (10s)</button>
    <button id="btn-cont">Continuation Alert</button>
    <button id="btn-recurring">Enable Recurring Report (every minute)</button>
  </div>
  <div id="output"></div>
  <script src="/js/jobs.js"></script>
</body>
</html>
